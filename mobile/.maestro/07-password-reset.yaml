# Flow 7: Forgot/reset password.
#
# Verifies the user can navigate from the login screen to the
# "Forgot Password" flow, submit their email, and see the success state.
#
# We do not assert the email arrives — that's verified separately via
# pytest. Maestro variables:
#   - RESET_EMAIL  (any valid email; backend always returns a generic success)
appId: com.bookswap.mobile
---
- launchApp:
    clearState: true
- assertVisible: "Log In"
- tapOn: "Forgot Password?"
- assertVisible:
    text: "Reset your password"
    optional: true
- tapOn: "Email"
- inputText: ${RESET_EMAIL}
- tapOn: "Send reset link"
- assertVisible:
    text: "Check your inbox|reset instructions"
    optional: true
- tapOn:
    text: "Back to login|Sign in"
    optional: true
- assertVisible: "Log In"
