name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual re-triggers (e.g. after transient GitHub infra failures)

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write  # required for npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full git history lets Changesets diff against the last release tag
          fetch-depth: 0

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn packages:build

      - name: Build app
        run: yarn build

      # - name: Upload source maps to Sentry
      #   if: env.SENTRY_AUTH_TOKEN != ''
      #   run: npx @sentry/cli sourcemaps upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" dist/
      #   env:
      #     SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      #     SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      #     SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When un-released changesets exist: opens (or updates) a "Version Packages" PR
          # When the Version Packages PR is merged: runs this command to publish
          publish: yarn changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # After Changesets bumps internal workspace dep ranges (e.g. tast-utils)
      # the lockfile goes stale. Regenerate and push so CI doesn't fail.
      - name: Update lockfile after version bump
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          yarn install --no-immutable
          if git diff --quiet yarn.lock; then
            echo "Lockfile unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add yarn.lock
            git commit -m "chore: update lockfile after changesets version bump"
            git push
          fi
