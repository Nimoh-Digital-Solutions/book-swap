# ---------------------------------------------------------------------------
# HSTS conditional map
# ---------------------------------------------------------------------------
# Sending Strict-Transport-Security on localhost poisons the browser's HSTS
# cache and forces all subsequent localhost requests to use HTTPS — which then
# fail because there is no TLS certificate. The map below returns an empty
# string for localhost (suppressing the header) and the full HSTS value for
# every other host.
# The variable is referenced in nginx/security_headers.conf.
map $host $hsts_header {
    ~^localhost$  "";
    default       "max-age=31536000; includeSubDomains";
}

# Social-bot detection: returns "1" for known social-crawler User-Agents
# so book detail pages can proxy to the Django OG-meta endpoint.
map $http_user_agent $is_social_bot {
    default                   0;
    ~*facebookexternalhit     1;
    ~*Twitterbot              1;
    ~*LinkedInBot             1;
    ~*WhatsApp                1;
    ~*TelegramBot             1;
    ~*Slackbot                1;
    ~*Discordbot              1;
    ~*Googlebot               1;
    ~*bingbot                 1;
}

log_format compact '$remote_addr "$request" $status $body_bytes_sent ${request_time}s';

map $uri $loggable {
    ~*\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|map)$  0;
    ~*/locales/                                                          0;
    ~*/manifest\.webmanifest$                                            0;
    ~*/sw\.js$                                                           0;
    ~*/workbox-                                                          0;
    default                                                              1;
}

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log compact if=$loggable;

    # Hide nginx version from response headers
    server_tokens off;

    # -----------------------------
    # Compression (performance)
    # -----------------------------
    # Serve pre-compressed .gz / .br files generated at build time by
    # vite-plugin-compression2 — avoids CPU-intensive on-the-fly compression.
    gzip_static on;

    # Fallback: compress on-the-fly for any file not pre-compressed
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        text/javascript
        image/svg+xml
        font/woff2
        application/manifest+json;

    # -----------------------------
    # Security headers
    # -----------------------------
    # IMPORTANT: nginx does NOT inherit add_header directives from the server
    # block into nested location blocks. Any location that defines its own
    # add_header directive(s) silently drops ALL server-block add_header
    # entries. Security headers are therefore injected via an include file
    # that is repeated inside every location block.
    # See: nginx/security_headers.conf for header definitions and commentary.

    # -----------------------------
    # Health check endpoint
    # -----------------------------
    location = /health {
        include /etc/nginx/conf.d/security_headers.conf;
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "healthy\n";
    }

    # -----------------------------
    # PWA update reliability
    # -----------------------------
    # Ensure the service worker updates reliably
    location = /sw.js {
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-cache" always;
        expires -1;
    }

    # Ensure the manifest updates reliably
    location = /manifest.webmanifest {
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-cache" always;
        expires -1;
    }

    # -----------------------------
    # Caching (important for SPAs)
    # -----------------------------

    # Never cache index.html (so new deployments show up immediately)
    location = /index.html {
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Also avoid caching the homepage response
    location = / {
        include /etc/nginx/conf.d/security_headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri /index.html;
    }

    # Cache Vite hashed assets forever
    # ^~ prevents regex locations from overriding this prefix match
    location ^~ /assets/ {
        include /etc/nginx/conf.d/security_headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Cache other static files (if any)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        include /etc/nginx/conf.d/security_headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # -----------------------------
    # API reverse proxy
    # -----------------------------
    # Proxies /api/ and /ws/ requests to the backend service.
    # BACKEND_URL is injected at container start-up via envsubst.
    # Set it in docker-compose.yml or pass -e BACKEND_URL=http://... at runtime.
    # Default: http://backend:8000 (matches the compose service name).
    # Projects with no backend: these locations are simply never hit.

    location /api/ {
        include /etc/nginx/conf.d/security_headers.conf;
        proxy_pass         ${BACKEND_URL};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cookie_path  / /;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # -----------------------------
    # Social-bot OG proxy for book pages
    # -----------------------------
    # When a social crawler requests a book detail page, proxy to the
    # Django OG-meta endpoint so the link preview shows the correct
    # title, author, and cover image without executing JavaScript.
    location ~ "^/[a-z]{2}/books/([a-f0-9-]+)$" {
        set $book_id $1;

        if ($is_social_bot) {
            rewrite ^ /internal-oembed/books/$book_id/ last;
        }

        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri /index.html;
    }

    # Internal-only location that proxies OG requests to the backend.
    # Using a named internal location avoids the unsafe proxy_pass-in-if pattern.
    location /internal-oembed/ {
        internal;
        rewrite ^/internal-oembed/(.*)$ /oembed/$1 break;
        proxy_pass         ${BACKEND_URL};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Proxy the oembed endpoint to the backend (direct access)
    location /oembed/ {
        proxy_pass         ${BACKEND_URL};
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # -----------------------------
    # SPA routing fallback
    # -----------------------------
    location / {
        include /etc/nginx/conf.d/security_headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------
    # Block hidden files
    # -----------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
