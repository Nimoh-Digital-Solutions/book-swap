# =============================================================================
# Security Headers — shared include for nginx location blocks.
#
# MAINTENANCE NOTE:
# nginx does NOT inherit add_header directives from a parent block into child
# location blocks. Any location that defines its own add_header directive(s)
# silently drops ALL add_header directives from the parent server block.
# This file is therefore included inside every location block so that security
# headers are guaranteed to be present on every response, regardless of which
# location pattern matches the request.
#
# Reference: https://nginx.org/en/docs/http/ngx_http_headers_module.html
# =============================================================================

add_header X-Content-Type-Options "nosniff" always;

# X-Frame-Options is kept in sync with the CSP frame-ancestors directive below.
# Both currently allow same-origin framing (SAMEORIGIN / frame-ancestors 'self').
# To forbid all framing, change both to DENY / frame-ancestors 'none'.
add_header X-Frame-Options "SAMEORIGIN" always;

add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# HSTS — DO NOT add `preload` in this template.
# The preload flag submits the domain to browsers' built-in HSTS preload list,
# which is permanent and irreversible. Add it manually only after reading
# https://hstspreload.org and deliberately opting in for your specific domain.
#
# $hsts_header is set by the `map` directive in nginx.conf:
#   - Empty string on localhost  → header omitted (prevents HSTS cache poisoning)
#   - Full value on any real host → header sent normally
add_header Strict-Transport-Security $hsts_header always;

# CSP:
# - Allows service worker and manifest.
# - style-src and font-src cover Google Fonts <link> resources; remove both if unused.
#   Note: Google Fonts are loaded via <link>, NOT via fetch/XHR, so they do NOT
#   belong in connect-src.  connect-src only governs fetch(), XHR, and WebSocket.
# - IMPORTANT: The API domain is injected at container startup via envsubst.
#   Set the CSP_CONNECT_SRC env var (e.g. "https://api.myapp.com wss://api.myapp.com")
#   when running the container. Include `wss://` origins for WebSocket connections.
#   The placeholder ${CSP_CONNECT_SRC} below is replaced by the Docker entrypoint script.
# - 'unsafe-inline' is intentionally absent from style-src; Vite+SCSS extracts
#   all CSS to static files so inline styles are not required.
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self';
    style-src 'self' https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: https://*.tile.openstreetmap.org;
    connect-src 'self' ${CSP_CONNECT_SRC};
    worker-src 'self';
    manifest-src 'self';
    object-src 'none';
    frame-ancestors 'self';
    base-uri 'self';
" always;
