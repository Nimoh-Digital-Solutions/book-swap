# BookSwap Frontend — Pi 5 Production
# Usage: docker compose -p bs_frontend_prod -f docker-compose.prod.yml up -d
#
# Mirrors docker-compose.staging.yml so prod and staging share topology.
# Adds production hardening (read-only root fs + tmpfs mounts).

services:
  frontend:
    build:
      # Build context is the repo root so packages/shared/ is available
      # for the @shared/* TS path alias (frontend/Dockerfile expects this).
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: https://api.book-swaps.com
        VITE_APP_TITLE: BookSwap
        VITE_SENTRY_ENVIRONMENT: production
        VITE_SITE_URL: https://book-swaps.com
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: bs_frontend_prod
    restart: unless-stopped
    ports:
      - "3071:8080"
    environment:
      CSP_CONNECT_SRC: "https://api.book-swaps.com wss://api.book-swaps.com 'self'"
      BACKEND_URL: "https://api.book-swaps.com"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
