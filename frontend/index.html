<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="/icons/favicon-32x32.png" sizes="32x32" type="image/png" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <title>BookSwap — Spend less, read more.</title>
    <meta
      name="description"
      content="A location-aware peer-to-peer book exchange platform. Discover, swap, and share physical books with people nearby."
    />
    <meta name="theme-color" content="#1a2f23" />

    <!-- Open Graph -->
    <meta property="og:title" content="BookSwap — Spend less, read more." />
    <meta property="og:description" content="Discover, swap, and share physical books with people nearby." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BookSwap — Spend less, read more." />
    <meta name="twitter:description" content="Discover, swap, and share physical books with people nearby." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Material Symbols icon font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- PWA capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Additional PWA meta tags -->
    <meta name="application-name" content="BookSwap" />
    <meta name="msapplication-TileColor" content="#1a2f23" />
  </head>
  <body>
    <noscript>
      You need to
      <a href="https://www.enable-javascript.com/" rel="external noopener noreferrer" target="_blank">
        enable JavaScript
      </a>
      to run this app.
    </noscript>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
