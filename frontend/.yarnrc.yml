nodeLinker: node-modules

# Fix transitive workspace:^ in published tast-ui / tast-hooks packages.
# Published versions of these packages erroneously ship workspace:^ for
# tast-utils in their manifest; packageExtensions patches that at resolution time.
packageExtensions:
  "@nimoh-digital-solutions/tast-ui@*":
    dependencies:
      "@nimoh-digital-solutions/tast-utils": "^1.1.0"
  "@nimoh-digital-solutions/tast-hooks@*":
    dependencies:
      "@nimoh-digital-solutions/tast-utils": "^1.1.0"

