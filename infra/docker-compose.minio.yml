# MinIO — planned S3-compatible object storage for BookSwap (e.g. media uploads).
# Not wired into the main app yet; intended to replace or supplement local filesystem media on Pi5 (ARM64).
# Usage: docker compose -f docker-compose.minio.yml up -d
# Set MINIO_ROOT_USER and MINIO_ROOT_PASSWORD in a .env file or export before compose.

services:
  minio:
    image: minio/minio:latest
    container_name: bookswap-minio
    # MinIO publishes official multi-arch images including linux/arm64 for Raspberry Pi 5.
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    # MinIO exposes /minio/health/live on the API port (requires curl/wget in image for CMD healthchecks).
    # Uncomment if your image includes curl:
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 15s

volumes:
  minio_data:
    driver: local
