# MinIO — S3-compatible object storage for BookSwap media uploads.
# Usage: docker compose -f docker-compose.minio.yml up -d
# Set MINIO_ROOT_USER and MINIO_ROOT_PASSWORD in a .env file or export before compose.

services:
  minio:
    image: minio/minio:latest
    container_name: bookswap-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  createbuckets:
    image: minio/mc:latest
    container_name: bookswap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/bookswap-media;
      mc anonymous set download local/bookswap-media/public;
      echo 'Bucket bookswap-media ready.';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}

volumes:
  minio_data:
    driver: local
