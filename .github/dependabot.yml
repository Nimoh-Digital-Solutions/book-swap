version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      backend-python:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      frontend-runtime:
        dependency-type: "production"
        patterns:
          - "*"
      frontend-dev:
        dependency-type: "development"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      mobile-runtime-safe:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      mobile-dev-safe:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "expo"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@expo/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-native"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@react-native/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "react-dom"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "mobile"

  - package-ecosystem: "npm"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      shared-npm:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "shared"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
