name: Deploy — Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all layers (backend + frontend + mobile OTA)"
        type: boolean
        default: true

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: "Pi 5 → staging"
    runs-on: [self-hosted, pi5]
    environment: staging
    # All `run:` steps default to the Pi app directory so git commands in
    # "Detect changed layers" operate on the real repo history, not the empty
    # GITHUB_WORKSPACE (no actions/checkout is used in this workflow).
    defaults:
      run:
        working-directory: /home/gnimoh001/apps/speak-linka

    steps:
      # Pull latest code into the canonical app directory on the Pi.
      # No actions/checkout needed — the Pi already has ~/speak-linka cloned.
      - name: Pull latest code
        run: |
          git fetch origin
          git reset --hard origin/staging

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          STATUS=$(gh api repos/${{ github.repository }}/commits/$SHA/status --jq '.state' 2>/dev/null || echo "unknown")
          echo "CI status for $SHA: $STATUS"
          if [ "$STATUS" != "success" ] && [ "$STATUS" != "pending" ]; then
            echo "::warning::CI has not passed for this commit ($STATUS). Proceeding with caution."
          fi

      # ── Detect which layers changed ───────────────────────────────────────────
      # Compares the push's before/after SHAs to decide whether to rebuild the
      # backend, the frontend, or both.  Falls back to a full deploy when the
      # before SHA is unavailable (force-push, first push to branch).
      - name: Detect changed layers
        id: detect
        run: |
          # Manual trigger with deploy_all → rebuild everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_all }}" = "true" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Manual full deploy requested."
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Force-push or new branch — can't diff; deploy everything safely.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "First push / force-push → deploying all layers."
            exit 0
          fi

          # If BEFORE isn't in local history (shallow clone edge-case), full deploy.
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Before SHA not in local history → deploying all layers."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files in this push:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^backend/'; then
            echo "backend=true"  >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^frontend/'; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^mobile/|^packages/shared/'; then
            echo "mobile=true"  >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

      - name: Nothing to deploy
        if: steps.detect.outputs.backend != 'true' && steps.detect.outputs.frontend != 'true' && steps.detect.outputs.mobile != 'true'
        run: |
          echo "No backend, frontend, or mobile files changed in this push — skipping deploy."

      # ── Backend ──────────────────────────────────────────────────────────────
      # .env.staging is a symlink → ~/envs/speaklinka.backend.staging.env (created once on the Pi).
      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/backend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p sl_staging \
            -f docker-compose.staging.yml build --no-cache

      - name: Remove old backend containers
        if: steps.detect.outputs.backend == 'true'
        run: |
          docker rm -f sl_web_staging sl_celery_staging sl_beat_staging 2>/dev/null || true

      - name: Deploy backend
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/backend
        run: |
          docker compose -p sl_staging -f docker-compose.staging.yml \
            up -d --force-recreate web celery_worker celery_beat

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/frontend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p sl_frontend_staging \
            -f docker-compose.staging.yml build --no-cache \
            --build-arg VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN_STAGING }}" \
            --build-arg VITE_AGORA_APP_ID="${{ secrets.VITE_AGORA_APP_ID_STAGING }}"

      - name: Remove old frontend container
        if: steps.detect.outputs.frontend == 'true'
        run: docker rm -f sl_frontend_staging 2>/dev/null || true

      - name: Deploy frontend
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/frontend
        run: |
          docker compose -p sl_frontend_staging -f docker-compose.staging.yml \
            up -d --force-recreate

      # ── Mobile OTA update ──────────────────────────────────────────────────────
      # Run OTA publish on the self-hosted Pi. Use --no-bytecode to avoid Hermes
      # compiler binary incompatibility on ARM64 runners.
      - name: Set up Node.js for mobile OTA
        if: steps.detect.outputs.mobile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Node/npm toolchain
        if: steps.detect.outputs.mobile == 'true'
        run: |
          node --version
          npm --version
          npx --version

      - name: Install mobile dependencies for EAS update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/mobile
        run: npm ci

      - name: Publish mobile OTA update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/speak-linka/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          npx eas-cli update \
            --branch staging \
            --message "deploy: staging $(date -u +'%Y-%m-%d %H:%M') — ${GITHUB_SHA::8}" \
            --no-bytecode \
            --non-interactive

      # ── Health checks ─────────────────────────────────────────────────────────
      - name: Health check — backend
        if: steps.detect.outputs.backend == 'true'
        run: |
          echo "Waiting for sl_web_staging to become healthy..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8109/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend healthy ✓"; break
            fi
            [ $i -eq 24 ] && echo "ERROR: Backend health check timed out." && exit 1
            echo "  Attempt $i/24 — retrying in 5s..."; sleep 5
          done

      - name: Health check — frontend
        if: steps.detect.outputs.frontend == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3003/ > /dev/null 2>&1; then
              echo "Frontend healthy ✓"; break
            fi
            [ $i -eq 12 ] && echo "ERROR: Frontend health check timed out." && exit 1
            sleep 5
          done

      # ── Smoke test — critical API endpoints ───────────────────────────────────
      - name: Smoke test — API endpoints
        if: steps.detect.outputs.backend == 'true'
        run: |
          BASE="http://localhost:8109/api/v1"
          FAIL=0
          for endpoint in \
            "$BASE/health/" \
            "$BASE/languages/" \
            "$BASE/subscriptions/plans/" \
            "$BASE/partners/cities/"; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "  ✓ $endpoint ($HTTP_CODE)"
            else
              echo "  ✗ $endpoint ($HTTP_CODE)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 1 ] && echo "WARNING: Some smoke tests failed" || echo "All smoke tests passed ✓"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Container status
        if: always()
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "sl_|NAMES" || true

      - name: Deployment summary
        if: steps.detect.outputs.backend == 'true' || steps.detect.outputs.frontend == 'true' || steps.detect.outputs.mobile == 'true'
        run: |
          echo "================================================="
          echo " SpeakLinka Staging — deployed successfully!"
          [ "${{ steps.detect.outputs.backend }}"  = "true" ] && echo " Backend  : https://api-stag.speaklinka.com  ✓"
          [ "${{ steps.detect.outputs.frontend }}" = "true" ] && echo " Frontend : https://stag.speaklinka.com      ✓"
          [ "${{ steps.detect.outputs.mobile }}"   = "true" ] && echo " Mobile   : OTA update published (staging)   ✓"
          echo "================================================="
