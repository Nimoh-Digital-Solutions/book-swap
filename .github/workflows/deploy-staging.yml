name: Deploy — Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all layers (backend + frontend + mobile OTA)"
        type: boolean
        default: true

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: "Pi 5 → staging"
    runs-on: [self-hosted, pi5]
    environment: staging
    defaults:
      run:
        working-directory: /home/gnimoh001/apps/bookswap

    steps:
      - name: Pull latest code
        run: |
          git fetch origin
          git reset --hard origin/staging

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          STATUS=$(gh api repos/${{ github.repository }}/commits/$SHA/status --jq '.state' 2>/dev/null || echo "unknown")
          echo "CI status for $SHA: $STATUS"
          if [ "$STATUS" != "success" ] && [ "$STATUS" != "pending" ]; then
            echo "::warning::CI has not passed for this commit ($STATUS). Proceeding with caution."
          fi

      # ── Detect which layers changed ───────────────────────────────────────────
      - name: Detect changed layers
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_all }}" = "true" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Manual full deploy requested."
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "First push / force-push → deploying all layers."
            exit 0
          fi

          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Before SHA not in local history → deploying all layers."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files in this push:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^backend/'; then
            echo "backend=true"  >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^frontend/'; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^mobile/|^packages/shared/'; then
            echo "mobile=true"  >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

      - name: Nothing to deploy
        if: steps.detect.outputs.backend != 'true' && steps.detect.outputs.frontend != 'true' && steps.detect.outputs.mobile != 'true'
        run: |
          echo "No backend, frontend, or mobile files changed in this push — skipping deploy."

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_staging \
            -f docker-compose.stag.yml build --no-cache

      - name: Remove old backend containers
        if: steps.detect.outputs.backend == 'true'
        run: |
          docker rm -f bs_web_staging bs_celery_staging bs_beat_staging 2>/dev/null || true

      - name: Deploy backend
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          docker compose -p bs_staging -f docker-compose.stag.yml \
            up -d --force-recreate web celery_worker celery_beat

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_frontend_staging \
            -f docker-compose.staging.yml build --no-cache \
            --build-arg VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN_STAGING }}"

      - name: Remove old frontend container
        if: steps.detect.outputs.frontend == 'true'
        run: docker rm -f bs_frontend_staging 2>/dev/null || true

      - name: Deploy frontend
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          docker compose -p bs_frontend_staging -f docker-compose.staging.yml \
            up -d --force-recreate

      # ── Mobile OTA update ──────────────────────────────────────────────────────
      - name: Set up Node.js for mobile OTA
        if: steps.detect.outputs.mobile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install mobile dependencies for EAS update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/mobile
        run: npm ci

      - name: Publish mobile OTA update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL_STAGING }}
          EXPO_PUBLIC_ENV: staging
          CI: "1"
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" != "x86_64" ] && [ "$ARCH" != "amd64" ]; then
            echo "⚠️  Skipping mobile OTA — hermesc requires x86_64 (current: $ARCH)"
            echo "   Run 'npx eas-cli update --branch staging' from an x86_64 machine instead."
            exit 0
          fi
          npx eas-cli update \
            --branch staging \
            --message "deploy: staging $(date -u +'%Y-%m-%d %H:%M') — ${GITHUB_SHA::8}" \
            --no-bytecode

      # ── Health checks ─────────────────────────────────────────────────────────
      - name: Health check — backend
        if: steps.detect.outputs.backend == 'true'
        run: |
          echo "Waiting for bs_web_staging to become healthy..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8110/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend healthy ✓"; break
            fi
            [ $i -eq 24 ] && echo "ERROR: Backend health check timed out." && exit 1
            echo "  Attempt $i/24 — retrying in 5s..."; sleep 5
          done

      - name: Health check — frontend
        if: steps.detect.outputs.frontend == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3004/ > /dev/null 2>&1; then
              echo "Frontend healthy ✓"; break
            fi
            [ $i -eq 12 ] && echo "ERROR: Frontend health check timed out." && exit 1
            sleep 5
          done

      # ── Smoke test — critical API endpoints ───────────────────────────────────
      - name: Smoke test — API endpoints
        if: steps.detect.outputs.backend == 'true'
        run: |
          BASE="http://localhost:8110/api/v1"
          FAIL=0
          for endpoint in \
            "$BASE/health/" \
            "$BASE/books/" \
            "$BASE/exchanges/"; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "  ✓ $endpoint ($HTTP_CODE)"
            else
              echo "  ✗ $endpoint ($HTTP_CODE)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 1 ] && echo "WARNING: Some smoke tests failed" || echo "All smoke tests passed ✓"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Container status
        if: always()
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "bs_|NAMES" || true

      - name: Deployment summary
        if: steps.detect.outputs.backend == 'true' || steps.detect.outputs.frontend == 'true' || steps.detect.outputs.mobile == 'true'
        run: |
          echo "================================================="
          echo " BookSwap Staging — deployed successfully!"
          [ "${{ steps.detect.outputs.backend }}"  = "true" ] && echo " Backend  : https://api-stag.bookswap.app  ✓"
          [ "${{ steps.detect.outputs.frontend }}" = "true" ] && echo " Frontend : https://stag.bookswap.app      ✓"
          [ "${{ steps.detect.outputs.mobile }}"   = "true" ] && echo " Mobile   : OTA update published (staging)   ✓"
          echo "================================================="
