name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: "Backend — lint + test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: bookswap_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (GDAL/GEOS for GeoDjango)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq gdal-bin libgdal-dev libgeos-dev

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit Python dependencies
        run: pip-audit --strict --desc --ignore-vuln CVE-2026-3219

      - name: Lint (ruff check)
        run: ruff check .

      - name: Lint (ruff format)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy apps bookswap --no-error-summary
        continue-on-error: true

      - name: Check for migration conflicts
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgis://test_user:test_password@localhost:5432/bookswap_test
          REDIS_URL: redis://localhost:6379/0
          GDAL_LIBRARY_PATH: ""
          GEOS_LIBRARY_PATH: ""
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgis://test_user:test_password@localhost:5432/bookswap_test
          CELERY_TASK_ALWAYS_EAGER: "True"
          REDIS_URL: redis://localhost:6379/0
          GDAL_LIBRARY_PATH: ""
          GEOS_LIBRARY_PATH: ""
        run: python -m pytest --tb=short -q --cov=apps --cov=bookswap --cov-report=term-missing --cov-fail-under=80

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend — type-check + lint + test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install shared package dependencies
        run: npm install
        working-directory: packages/shared

      - name: Audit JS dependencies
        run: yarn npm audit --severity high || true
        continue-on-error: true

      - name: Type-check
        run: yarn type-check

      - name: Lint (ESLint)
        run: yarn lint

      - name: Lint (Stylelint)
        run: yarn stylelint

      - name: Tests (with coverage)
        run: yarn test:coverage

      - name: Build
        run: yarn build

      - name: Check bundle size
        run: |
          # Find the main JS chunk and check its gzipped size (PRD target: ≤ 200 KB)
          MAIN_CHUNK=$(find dist/assets -name 'index-*.js' -o -name 'main-*.js' | head -1)
          if [ -z "$MAIN_CHUNK" ]; then
            echo "⚠️  No main JS chunk found — looking for largest JS file"
            MAIN_CHUNK=$(ls -S dist/assets/*.js 2>/dev/null | head -1)
          fi
          if [ -z "$MAIN_CHUNK" ]; then
            echo "❌ No JS files found in dist/assets/"
            exit 1
          fi
          RAW_KB=$(du -k "$MAIN_CHUNK" | cut -f1)
          GZIP_BYTES=$(gzip -c "$MAIN_CHUNK" | wc -c)
          GZIP_KB=$((GZIP_BYTES / 1024))
          echo "Main chunk: $MAIN_CHUNK"
          echo "  Raw:    ${RAW_KB} KB"
          echo "  Gzipped: ${GZIP_KB} KB"
          if [ "$GZIP_KB" -gt 300 ]; then
            echo "❌ Bundle exceeds 300 KB gzipped limit (${GZIP_KB} KB)"
            exit 1
          fi
          echo "✅ Bundle size OK (${GZIP_KB} KB gzipped, limit 300 KB)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Mobile ──────────────────────────────────────────────────────────────
  mobile:
    name: "Mobile — type-check + lint + test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install shared package dependencies
        run: npm ci
        working-directory: packages/shared

      - name: Audit JS dependencies
        run: npm audit --omit=dev --audit-level=high || true
        continue-on-error: true

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Check version sync (app.json ↔ package.json)
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "app.json version:     $APP_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$APP_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! app.json ($APP_VERSION) ≠ package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "✅ Versions match: $APP_VERSION"

      - name: Tests
        run: npm test -- --ci --forceExit

  # ── Container Image Scanning ─────────────────────────────────────────────
  container-scan:
    name: "Security — container image scan"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        context:
          - { name: backend, file: backend/Dockerfile, dir: backend }
          # Frontend Dockerfile expects the repo root as context so the
          # packages/shared workspace is available for the @shared/* alias.
          - { name: frontend, file: frontend/Dockerfile, dir: . }

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: |
          docker build -t bookswap-${{ matrix.context.name }}:scan \
            -f ${{ matrix.context.file }} ${{ matrix.context.dir }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bookswap-${{ matrix.context.name }}:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  # ── Shared Package ─────────────────────────────────────────────────────
  shared:
    name: "Shared — test"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/shared

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Tests
        run: npm test
