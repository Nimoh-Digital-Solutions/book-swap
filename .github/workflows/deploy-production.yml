name: Deploy — Production

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all layers (backend + frontend + mobile OTA)"
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: "Pi 5 → production"
    runs-on: [self-hosted, pi5]
    environment: production
    defaults:
      run:
        working-directory: /home/gnimoh001/apps/bookswap

    steps:
      - name: Pull latest code
        run: |
          git fetch origin
          git reset --hard origin/production

      - name: Verify CI passed for this commit
        # `workflow_dispatch` is operator-initiated (manual run from the
        # Actions UI). Trust the operator and skip the gate — useful when
        # the gate itself needs to be bypassed for a hotfix or when an
        # automated deploy aborted due to a transient lookup quirk.
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The current production HEAD is usually a merge commit produced by
          # a `staging → production` PR. Merge commits to `production` don't
          # trigger CI (CI only runs on push to `main` and PRs against `main`),
          # so the merge SHA itself has zero check-runs.
          #
          # Walk up the second-parent chain (the branch being merged in) until
          # we find a commit that does have check-runs — that's the commit on
          # `main` whose CI status we actually want to validate.
          SHA=$(git rev-parse HEAD)
          ORIGINAL_SHA=$SHA
          MAX_DEPTH=6

          for depth in $(seq 0 $MAX_DEPTH); do
            CONCLUSIONS=$(gh api \
              "repos/${{ github.repository }}/commits/$SHA/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name | test("Pi 5 .*production"; "i") | not) | {name, status, conclusion}]' \
              2>/dev/null || echo "[]")

            COUNT=$(echo "$CONCLUSIONS" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              if [ "$SHA" != "$ORIGINAL_SHA" ]; then
                echo "Walked up $depth merge parent(s) from $ORIGINAL_SHA → $SHA to find CI runs."
              fi
              break
            fi

            # Try second parent (source side of the merge commit). When that
            # doesn't exist (non-merge commit), fall back to first parent.
            NEXT=$(git rev-parse "$SHA^2" 2>/dev/null || git rev-parse "$SHA^" 2>/dev/null || true)
            if [ -z "$NEXT" ] || [ "$NEXT" = "$SHA" ]; then
              break
            fi
            SHA=$NEXT
          done

          echo "Validating check-runs for $SHA:"
          echo "$CONCLUSIONS" | jq -r '.[] | "  - \(.name): \(.status)/\(.conclusion // "n/a")"'

          TOTAL=$(echo "$CONCLUSIONS" | jq 'length')
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No check-runs found for $ORIGINAL_SHA or any ancestor up to depth $MAX_DEPTH. Aborting production deploy."
            exit 1
          fi

          INCOMPLETE=$(echo "$CONCLUSIONS" | jq '[.[] | select(.status != "completed")] | length')
          if [ "$INCOMPLETE" -gt 0 ]; then
            echo "::error::$INCOMPLETE check-run(s) still in progress for $SHA. Aborting."
            exit 1
          fi

          BAD=$(echo "$CONCLUSIONS" | jq '[.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length')
          if [ "$BAD" -gt 0 ]; then
            echo "::error::$BAD check-run(s) did not pass for $SHA. Aborting production deploy."
            exit 1
          fi

          echo "All check-runs passed ✓"

      # ── Detect which layers changed ───────────────────────────────────────────
      - name: Detect changed layers
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_all }}" = "true" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Manual full deploy requested."
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "First push / force-push → deploying all layers."
            exit 0
          fi

          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "mobile=true"   >> $GITHUB_OUTPUT
            echo "Before SHA not in local history → deploying all layers."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files in this push:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^backend/'; then
            echo "backend=true"  >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          # Frontend redeploy is also triggered by changes in packages/shared,
          # because the Vite build inlines those types via the @shared alias.
          if echo "$CHANGED" | grep -qE '^frontend/|^packages/shared/'; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^mobile/|^packages/shared/'; then
            echo "mobile=true"  >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

      - name: Nothing to deploy
        if: steps.detect.outputs.backend != 'true' && steps.detect.outputs.frontend != 'true' && steps.detect.outputs.mobile != 'true'
        run: |
          echo "No backend, frontend, or mobile files changed in this push — skipping deploy."

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Link backend env file
        if: steps.detect.outputs.backend == 'true'
        run: |
          ln -sf ~/envs/bookswap.backend.prod.env \
            /home/gnimoh001/apps/bookswap/backend/.env.production

      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_prod \
            -f docker-compose.prod.yml build --no-cache

      - name: Remove old backend containers
        if: steps.detect.outputs.backend == 'true'
        run: |
          docker rm -f bs_web_prod bs_celery_prod bs_beat_prod 2>/dev/null || true

      - name: Deploy backend
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          docker compose -p bs_prod -f docker-compose.prod.yml \
            up -d --force-recreate web celery_worker celery_beat

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_frontend_prod \
            -f docker-compose.prod.yml build --no-cache \
            --build-arg VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN_PROD }}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"

      - name: Remove old frontend container
        if: steps.detect.outputs.frontend == 'true'
        run: docker rm -f bs_frontend_prod 2>/dev/null || true

      - name: Deploy frontend
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          docker compose -p bs_frontend_prod -f docker-compose.prod.yml \
            up -d --force-recreate

      # ── Mobile OTA update ──────────────────────────────────────────────────────
      - name: Set up Node.js for mobile OTA
        if: steps.detect.outputs.mobile == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install mobile dependencies for EAS update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/mobile
        run: npm ci

      - name: Publish mobile OTA update
        if: steps.detect.outputs.mobile == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL_PRODUCTION }}
          EXPO_PUBLIC_ENV: production
          CI: "1"
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" != "x86_64" ] && [ "$ARCH" != "amd64" ]; then
            echo "⚠️  Skipping mobile OTA — hermesc requires x86_64 (current: $ARCH)"
            echo "   Run 'npx eas-cli update --branch production' from an x86_64 machine instead."
            exit 0
          fi
          npx eas-cli update \
            --branch production \
            --message "deploy: production $(date -u +'%Y-%m-%d %H:%M') — ${GITHUB_SHA::8}" \
            --no-bytecode

      # ── Health checks ─────────────────────────────────────────────────────────
      - name: Health check — backend
        if: steps.detect.outputs.backend == 'true'
        run: |
          echo "Waiting for bs_web_prod to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8071/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend healthy ✓"; break
            fi
            [ $i -eq 30 ] && echo "ERROR: Backend health check timed out." && exit 1
            echo "  Attempt $i/30 — retrying in 5s..."; sleep 5
          done

      - name: Health check — frontend
        if: steps.detect.outputs.frontend == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3071/ > /dev/null 2>&1; then
              echo "Frontend healthy ✓"; break
            fi
            [ $i -eq 12 ] && echo "ERROR: Frontend health check timed out." && exit 1
            sleep 5
          done

      # ── Smoke test — critical API endpoints ───────────────────────────────────
      - name: Smoke test — API endpoints
        if: steps.detect.outputs.backend == 'true'
        run: |
          BASE="http://localhost:8071/api/v1"
          FAIL=0
          for endpoint in \
            "$BASE/health/" \
            "$BASE/books/" \
            "$BASE/exchanges/"; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "  ✓ $endpoint ($HTTP_CODE)"
            else
              echo "  ✗ $endpoint ($HTTP_CODE)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 1 ] && echo "WARNING: Some smoke tests failed" || echo "All smoke tests passed ✓"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Container status
        if: always()
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "bs_.*_prod|NAMES" || true

      - name: Deployment summary
        if: steps.detect.outputs.backend == 'true' || steps.detect.outputs.frontend == 'true' || steps.detect.outputs.mobile == 'true'
        run: |
          echo "================================================="
          echo " BookSwap Production — deployed successfully!"
          [ "${{ steps.detect.outputs.backend }}"  = "true" ] && echo " Backend  : https://api.bookswap.app    ✓"
          [ "${{ steps.detect.outputs.frontend }}" = "true" ] && echo " Frontend : https://bookswap.app        ✓"
          [ "${{ steps.detect.outputs.mobile }}"   = "true" ] && echo " Mobile   : OTA update published (prod)  ✓"
          echo "================================================="
