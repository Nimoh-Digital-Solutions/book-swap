name: Deploy — Production

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force deploy all layers (backend + frontend)"
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: "Pi 5 → production"
    runs-on: [self-hosted, pi5]
    environment: production
    defaults:
      run:
        working-directory: /home/gnimoh001/apps/bookswap

    steps:
      - name: Pull latest code
        run: |
          git fetch origin
          git reset --hard origin/production

      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          STATUS=$(gh api repos/${{ github.repository }}/commits/$SHA/status --jq '.state' 2>/dev/null || echo "unknown")
          echo "CI status for $SHA: $STATUS"
          if [ "$STATUS" != "success" ]; then
            echo "::error::CI has not passed for this commit ($STATUS). Aborting production deploy."
            exit 1
          fi

      # ── Detect which layers changed ───────────────────────────────────────────
      - name: Detect changed layers
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_all }}" = "true" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "Manual full deploy requested."
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "First push / force-push → deploying both layers."
            exit 0
          fi

          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "Before SHA not in local history → deploying both layers."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "Changed files in this push:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^backend/'; then
            echo "backend=true"  >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^frontend/'; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

      - name: Nothing to deploy
        if: steps.detect.outputs.backend != 'true' && steps.detect.outputs.frontend != 'true'
        run: |
          echo "No backend or frontend files changed in this push — skipping deploy."

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Copy backend env file
        if: steps.detect.outputs.backend == 'true'
        run: cp ~/envs/bookswap.backend.prod.env ~/apps/bookswap/backend/.env.production

      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_prod \
            -f docker-compose.prod.yml build --no-cache

      - name: Remove old backend containers
        if: steps.detect.outputs.backend == 'true'
        run: |
          docker rm -f bookswap-be-web bookswap-be-celery bookswap-be-celery-email \
            bookswap-be-celery-maintenance bookswap-be-celery-beat bookswap-be-redis \
            2>/dev/null || true

      - name: Deploy backend
        if: steps.detect.outputs.backend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/backend
        run: |
          docker compose -p bs_prod -f docker-compose.prod.yml \
            up -d --force-recreate web celery celery-email celery-maintenance celery-beat

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          DOCKER_BUILDKIT=1 docker compose -p bs_frontend_prod \
            -f docker-compose.prod.yml build --no-cache \
            --build-arg VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN_PROD }}"

      - name: Remove old frontend container
        if: steps.detect.outputs.frontend == 'true'
        run: docker rm -f bookswap-fe-prod 2>/dev/null || true

      - name: Deploy frontend
        if: steps.detect.outputs.frontend == 'true'
        working-directory: /home/gnimoh001/apps/bookswap/frontend
        run: |
          docker compose -p bs_frontend_prod -f docker-compose.prod.yml \
            up -d --force-recreate

      # ── Health checks ─────────────────────────────────────────────────────────
      - name: Health check — backend
        if: steps.detect.outputs.backend == 'true'
        run: |
          echo "Waiting for bookswap-be-web to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8071/api/v1/health/ > /dev/null 2>&1; then
              echo "Backend healthy ✓"; break
            fi
            [ $i -eq 30 ] && echo "ERROR: Backend health check timed out." && exit 1
            echo "  Attempt $i/30 — retrying in 5s..."; sleep 5
          done

      - name: Health check — frontend
        if: steps.detect.outputs.frontend == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3071/ > /dev/null 2>&1; then
              echo "Frontend healthy ✓"; break
            fi
            [ $i -eq 12 ] && echo "ERROR: Frontend health check timed out." && exit 1
            sleep 5
          done

      # ── Smoke test — critical API endpoints ───────────────────────────────────
      - name: Smoke test — API endpoints
        if: steps.detect.outputs.backend == 'true'
        run: |
          BASE="http://localhost:8071/api/v1"
          FAIL=0
          for endpoint in \
            "$BASE/health/" \
            "$BASE/books/" \
            "$BASE/exchanges/"; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$endpoint" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "  ✓ $endpoint ($HTTP_CODE)"
            else
              echo "  ✗ $endpoint ($HTTP_CODE)"
              FAIL=1
            fi
          done
          [ $FAIL -eq 1 ] && echo "WARNING: Some smoke tests failed" || echo "All smoke tests passed ✓"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Container status
        if: always()
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "bookswap-|NAMES" || true

      - name: Deployment summary
        if: steps.detect.outputs.backend == 'true' || steps.detect.outputs.frontend == 'true'
        run: |
          echo "================================================="
          echo " BookSwap Production — deployed successfully!"
          [ "${{ steps.detect.outputs.backend }}"  = "true" ] && echo " Backend  : https://api.bookswap.app  ✓"
          [ "${{ steps.detect.outputs.frontend }}" = "true" ] && echo " Frontend : https://bookswap.app      ✓"
          echo "================================================="
