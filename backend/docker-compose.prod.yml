# BookSwap — Pi 5 Production (Backend)
# Usage: docker compose -p bs_prod -f docker-compose.prod.yml up -d
#
# Mirrors docker-compose.stag.yml so prod and staging share topology
# (shared Redis container `redis_shared`, host PostgreSQL via
# host.docker.internal, env file managed outside the repo).
#
# Prerequisites (run once on the Pi):
#   sudo -u postgres createuser bs_prod && sudo -u postgres createdb -O bs_prod bs_prod
#   sudo -u postgres psql -d bs_prod -c "CREATE EXTENSION IF NOT EXISTS postgis;"
#   docker network create shared      # if not already present
#   sudo mkdir -p /mnt/media/bookswap-prod && sudo chown -R 1000:1000 /mnt/media/bookswap-prod
#   ln -sf ~/envs/bookswap.backend.prod.env backend/.env.production

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bs_web_prod
    restart: unless-stopped
    command: /app/start.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_ENVIRONMENT: production
      # redis_shared has the default 16 logical DBs (0-15). Staging owns
      # 11/12/13. Prod uses 14/15 contiguously plus DB 4 for the result
      # backend (DB 16 would overflow the default range).
      REDIS_URL: redis://redis_shared:6379/14
      CELERY_BROKER_URL: redis://redis_shared:6379/15
      CELERY_RESULT_BACKEND: redis://redis_shared:6379/4
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
      PORT: "8071"
    volumes:
      - /mnt/media/bookswap-prod:/app/mediafiles
    ports:
      - "8071:8071"
    networks:
      - bs_network_prod
      - shared
    # Resource caps — top-level keys (mem_limit/cpus) instead of `deploy:` so
    # Compose v2 in standalone (non-Swarm) mode actually applies them. With
    # `deploy.resources.limits.memory` only the cpus slice was honoured and
    # memory ran unbounded (verified via `docker inspect`).
    # Sized for a 16 GB Pi 5 hosting 5 projects: 8 gunicorn workers × ~150 MB
    # ≈ 1.2 GB peak; 1.5 GB cap leaves headroom. Cpus: 2 of 4 cores.
    cpus: 2.0
    mem_limit: 1536m
    mem_reservation: 768m
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('127.0.0.1',8071); c.request('GET','/api/v1/health/'); r=c.getresponse(); exit(0 if r.status in [200,301,302] else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bs_celery_prod
    restart: unless-stopped
    # concurrency=4 matches the Pi's 4 cores so push/email fan-outs stop
    # serialising behind 2 workers. With CPU cap of 1.5 the worker can burst
    # but cannot starve the web tier.
    command: >
      celery -A config.celery worker -l info --concurrency=4
      -Q default,celery,email,maintenance
      --max-tasks-per-child=500 --time-limit=3600 --soft-time-limit=3300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_ENVIRONMENT: production
      REDIS_URL: redis://redis_shared:6379/14
      CELERY_BROKER_URL: redis://redis_shared:6379/15
      CELERY_RESULT_BACKEND: redis://redis_shared:6379/4
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
    volumes:
      - /mnt/media/bookswap-prod:/app/mediafiles
    networks:
      - bs_network_prod
      - shared
    cpus: 1.5
    mem_limit: 1024m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "celery", "-A", "config.celery", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bs_beat_prod
    restart: unless-stopped
    command: >
      celery -A config.celery beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_ENVIRONMENT: production
      REDIS_URL: redis://redis_shared:6379/14
      CELERY_BROKER_URL: redis://redis_shared:6379/15
      CELERY_RESULT_BACKEND: redis://redis_shared:6379/4
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
    networks:
      - bs_network_prod
      - shared
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; pid=int(open('/tmp/celerybeat.pid').read()); os.kill(pid, 0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  bs_network_prod:
    driver: bridge
  shared:
    external: true
