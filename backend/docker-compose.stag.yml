# bookswap — staging Docker Compose
# Usage: docker compose -f docker-compose.stag.yml up -d
#
# All secrets must be provided via environment variables (see .env.example).
# Do NOT set literal secret values here.
#
# Staging mirrors the production stack but uses the staging settings module
# and exposes host-facing ports for internal testing.
services:
  redis:
    image: redis:7-alpine
    container_name: bookswap-be-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    image: ${IMAGE_NAME:-bookswap/web:latest}
    container_name: bookswap-be-web
    build:
      context: .
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
      APP_VERSION: ${APP_VERSION:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      NOREPLY_EMAIL: ${NOREPLY_EMAIL}

    ports:
      - "8070:8000"

    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped



  celery:
    image: ${IMAGE_NAME:-bookswap/web:latest}
    container_name: bookswap-be-celery
    command: celery -A config.celery worker --loglevel=info -Q default,email,maintenance
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    image: ${IMAGE_NAME:-bookswap/web:latest}
    container_name: bookswap-be-celery-beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      - redis
    restart: unless-stopped


# ── Shared network ────────────────────────────────────────────────────────────
# Uncomment to link this BE with a FE container stack on the same host.
# Run `make network-create` first, then reference the same network in the FE
# docker-compose so nginx can proxy to `web:8000`.
# networks:
#   default:
#     name: bookswap-network
#     external: true
