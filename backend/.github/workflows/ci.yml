# .github/workflows/ci.yml
# Generated by nimoh-base init — nimoh-be-django-base 0.9.1
name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]


    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bookswap
          POSTGRES_USER: gnimoh001
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gnimoh001"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5




      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: bookswap.config.settings.ci
          DATABASE_URL: postgres://gnimoh001:testpassword@localhost:5432/bookswap


          CELERY_TASK_ALWAYS_EAGER: "True"
          REDIS_URL: redis://localhost:6379/0

        run: |
          python -m pytest --tb=short -q

  # ── Docker build smoke-test ───────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bookswap:${{ github.sha }} .
