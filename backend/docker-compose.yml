name: bookswap

services:
  redis:
    image: redis:7-alpine
    container_name: bookswap-be-redis
    ports:
      - "6449:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: bookswap-be-web
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://gnimoh001:${DB_PASSWORD:-changeme}@host.docker.internal:5432/bookswap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      # 'backend' allows the FE nginx container to reach this service by its Docker service name.
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      # Include both FE dev (:3070) and FE prod-nginx (:8150) origins so either FE stack works
      # without editing this file.  Override via .env for additional origins.
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3070,http://localhost:8150}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    volumes:
      - .:/app
    ports:
      - "8070:8000"
    depends_on:
      redis:
        condition: service_healthy


  celery:
    build: .
    container_name: bookswap-be-celery
    command: celery -A config.celery worker --loglevel=info -Q default,email,maintenance
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://gnimoh001:${DB_PASSWORD:-changeme}@host.docker.internal:5432/bookswap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3070,http://localhost:8150}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    volumes:
      - .:/app
    depends_on:
      - redis

  celery-beat:
    build: .
    container_name: bookswap-be-celery-beat
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgresql://gnimoh001:${DB_PASSWORD:-changeme}@host.docker.internal:5432/bookswap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3070,http://localhost:8150}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    volumes:
      - .:/app
    depends_on:
      - redis

